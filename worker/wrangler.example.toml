name = "uptime-worker"
main = "src/index.ts"
compatibility_date = "2024-02-08"

# 定时任务：每分钟触发一次，用于检查是否需要重试或进行常规监测
[triggers]
crons = ["* * * * *"]

# D1 数据库配置
# 请在终端运行 'npx wrangler d1 create uptime-db' 获取 database_id 并替换下方的值
[[d1_databases]]
binding = "DB"
database_name = "uptime-db"
database_id = "your-d1-database-id-here"

# 管理员认证（二选一，都填时 API Key 优先）
# [vars]
# ADMIN_API_KEY = "your-admin-key"
# ADMIN_PASSWORD = "your-admin-password"
# ALLOWED_ORIGIN = "https://your-pages-project.pages.dev"
# SESSION_TTL_HOURS = "12"
